<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Extrait à rejouer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;700&display=swap');

        :root {
            --bg: #010520;
            --panel: #0b1336;
            --accent: #3c6dff;
            --good: #2ec27e;
            --bad: #ff4d5e;
            --text: #e8ecff;
            --muted: #8c97c9;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { overflow-x: hidden; }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(1200px 600px at 50% -10%, #142057 0%, var(--bg) 60%);
            color: var(--text);
            font-family: "Baloo 2", system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 18px 10px 50px;
        }

        h1 { margin: 4px 0 2px; font-weight: 700; font-size: clamp(19px, 5vw, 30px); text-align: center; }
        .subtitle { color: var(--muted); margin: 0 0 6px; text-align: center; font-size: clamp(12px, 3.2vw, 15px); max-width: 560px; }
        .nav { display: flex; gap: 14px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
        .nav a { color: var(--accent); text-decoration: none; font-size: 14px; }

        .confidence { font-size: 12px; border-radius: 20px; padding: 4px 12px; margin-bottom: 10px; border: 1px solid #233169; background: var(--panel); }
        .confidence.solid { color: var(--good); border-color: #1e6b48; }
        .confidence.approx { color: #ffb14d; border-color: #5a431f; }

        .scoreboard { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; justify-content: center; }
        .score-card { background: var(--panel); border: 1px solid #233169; border-radius: 12px; padding: 5px 16px; text-align: center; min-width: 84px; }
        .score-card .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
        .score-card .value { font-size: 22px; font-weight: 700; }

        .display-area { width: 100%; max-width: 460px; display: flex; flex-direction: column; align-items: center; min-height: 200px; justify-content: center; }
        .staff-wrap { background: #fbfbff; border-radius: 16px; padding: 8px 10px; box-shadow: 0 10px 40px rgba(0,0,0,.45); width: 100%; max-width: 460px; }
        #staff { display: block; width: 100%; height: auto; }

        .hidden-card { background: var(--panel); border: 1px dashed #3a4a86; border-radius: 16px; padding: 26px 20px; text-align: center; color: var(--muted); width: 100%; max-width: 460px; font-size: 16px; }
        .hidden-card .big { font-size: 32px; display: block; margin-bottom: 6px; }
        .is-hidden { display: none !important; }

        .piano-scaler { margin: 14px auto 0; position: relative; }
        .piano { position: absolute; top: 0; left: 0; transform-origin: top left; user-select: none; touch-action: manipulation; }
        .key { position: absolute; top: 0; cursor: pointer; border-radius: 0 0 6px 6px; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 8px; font-size: 11px; font-weight: 600; }
        .key.white { height: 200px; background: linear-gradient(#ffffff, #eef0fb); border: 1px solid #c4c9e6; color: #4a5285; z-index: 1; }
        .key.black { height: 120px; background: linear-gradient(#2a2f4a, #11142a); border: 1px solid #000; color: #c9cfff; z-index: 2; }
        .key.white.active { background: linear-gradient(#e4e7fb, #d3d8f5); }
        .key.black.active { background: linear-gradient(#3a4066, #1b1f3a); }
        .key.correct { background: linear-gradient(var(--good), #1e9b61) !important; color: #fff; }
        .key.wrong { background: linear-gradient(var(--bad), #c92f3e) !important; color: #fff; }

        .midi-status { font-size: 12px; border-radius: 20px; padding: 4px 12px; margin: 4px 0 10px; border: 1px solid #233169; background: var(--panel); color: var(--muted); }
        .midi-status.on { color: var(--good); border-color: #1e6b48; background: #0c2b1f; }

        .controls { margin-top: 20px; display: flex; flex-direction: column; gap: 12px; align-items: center; width: 100%; max-width: 580px; }
        .control-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; align-items: center; }
        .seg-label { color: var(--muted); font-size: 13px; width: 100%; text-align: center; margin-bottom: -4px; }
        .segmented { display: inline-flex; background: var(--panel); border: 1px solid #233169; border-radius: 10px; overflow: hidden; }
        .segmented button { background: transparent; border: none; color: var(--muted); font-family: inherit; font-size: 14px; font-weight: 600; padding: 9px 14px; cursor: pointer; transition: background .12s, color .12s; }
        .segmented button.active { background: var(--accent); color: #fff; }

        button.btn { background: var(--accent); color: #fff; border: none; border-radius: 10px; padding: 11px 20px; font-family: inherit; font-size: 15px; font-weight: 700; cursor: pointer; }
        button.btn:active { transform: translateY(1px); }

        .toggle { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); font-size: 14px; cursor: pointer; background: var(--panel); border: 1px solid #233169; border-radius: 10px; padding: 8px 12px; }
        .toggle input { width: 16px; height: 16px; }

        .hint { margin-top: 14px; color: var(--muted); font-size: 13px; text-align: center; max-width: 540px; padding: 0 10px; }
    </style>
</head>

<body>
    <div class="nav">
        <a href="piano.html">🎹 Entraîneur d'accords</a>
        <a href="lecture.html">👀 Lecture à vue</a>

    <h1>🎼 Extrait à rejouer</h1>
    <p class="subtitle" id="pieceSubtitle"></p>
    <div class="confidence" id="confidence"></div>

    <div class="control-row"><span class="seg-label">Morceau</span></div>
    <div class="control-row" style="margin-bottom:8px;">
        <div class="segmented" id="pieceMode">
            <button data-piece="krumkake" class="active">Krumkake Craftshop</button>
            <button data-piece="vourukasha">Vourukasha Oasis</button>
        </div>
    </div>

    <div class="scoreboard">
        <div class="score-card"><div class="label">Réussis</div><div class="value" id="score">0</div></div>
        <div class="score-card"><div class="label">Série</div><div class="value" id="streak">0</div></div>
        <div class="score-card"><div class="label">Erreurs</div><div class="value" id="mistakes">0</div></div>

    <div class="display-area">
        <div class="staff-wrap" id="staffWrap">
            <svg id="staff" viewBox="0 0 360 260"></svg>

        <div class="hidden-card is-hidden" id="hiddenCard">
            <span class="big">🙈</span>

        </div>

    <div class="piano-scaler" id="pianoScaler">
        <div class="piano" id="piano"></div>
    </div>

    <div class="midi-status" id="midiStatus">🎛️ MIDI : recherche…</div>

    <div class="controls">
        <div class="control-row"><span class="seg-label">Longueur de l'extrait</span></div>
        <div class="control-row">
            <div class="segmented" id="lenMode">
                <button data-len="1">1 mesure</button>
                <button data-len="2" class="active">2 mesures</button>
                <button data-len="4">4 mesures</button>
            </div>
        </div>

        <div class="control-row"><span class="seg-label">Cacher après…</span></div>
        <div class="control-row">
            <div class="segmented" id="hideMode">
                <button data-ms="0" class="active">Jamais</button>
                <button data-ms="5000">5 sec</button>
                <button data-ms="2000">2 sec</button>
            </div>
        </div>

        <div class="control-row">
            <button class="btn" id="newExcerpt">Nouvel extrait</button>
            <button class="btn" id="replay">🔊 Réécouter</button>
            <label class="toggle"><input type="checkbox" id="showKeyNames"> Noms des touches</label>
        </div>
    </div>

    <p class="hint" id="hintText"></p>

        const staff = document.getElementById('staff');
        const T_TOP = 40, T_BOTTOM = 96, T_REF = 30;   // treble : E4 = ligne du bas
        const B_TOP = 150, B_BOTTOM = 206, B_REF = 18; // basse : G2 = ligne du bas
        const LINE_GAP = 14, STEP = 7;
        const INK = '#111';

        function svgEl(tag, attrs) {
            const e = document.createElementNS(SVG_NS, tag);
            for (const k in attrs) e.setAttribute(k, attrs[k]);
            return e;
        }
        function yForSide(note, side) {
            return side === 't'
                ? T_BOTTOM - (note.diatonic - T_REF) * STEP
                : B_BOTTOM - (note.diatonic - B_REF) * STEP;
        }

        function drawStaff() {
            staff.innerHTML = '';
            // viewBox dynamique : englobe les notes qui sortent de la portée (hampes/lignes suppl. incluses)
            let minY = T_TOP, maxY = B_BOTTOM;
            excerpt.forEach(measure => measure.events.forEach(ev => {
                ev.t.forEach(n => { const y = yForSide(n, 't'); if (y < minY) minY = y; if (y > maxY) maxY = y; });
                ev.b.forEach(n => { const y = yForSide(n, 'b'); if (y < minY) minY = y; if (y > maxY) maxY = y; });
            }));
            const top = Math.min(T_TOP, minY - 34);
            const bottom = Math.max(B_BOTTOM, maxY + 34);
            staff.setAttribute('viewBox', `0 ${top.toFixed(1)} 360 ${(bottom - top).toFixed(1)}`);

            [[T_TOP, T_BOTTOM], [B_TOP, B_BOTTOM]].forEach(([top]) => {
                for (let i = 0; i < 5; i++) {
                    const y = top + i * LINE_GAP;
                    staff.appendChild(svgEl('line', { x1: 14, y1: y, x2: 346, y2: y, stroke: INK, 'stroke-width': 1.2 }));
                }
            });
            staff.appendChild(svgEl('line', { x1: 14, y1: T_TOP, x2: 14, y2: B_BOTTOM, stroke: INK, 'stroke-width': 2 }));
            const clefT = svgEl('text', { x: 16, y: 96, 'font-size': 70, fill: INK }); clefT.textContent = '𝄞';
            staff.appendChild(clefT);
            const clefB = svgEl('text', { x: 18, y: 190, 'font-size': 50, fill: INK }); clefB.textContent = '𝄢';
            staff.appendChild(clefB);

            const nMeasures = excerpt.length;
            const measureW = (346 - 44) / nMeasures;
            let x = 44;
            excerpt.forEach((measure, mi) => {
                if (mi > 0) staff.appendChild(svgEl('line', { x1: x, y1: T_TOP, x2: x, y2: B_BOTTOM, stroke: INK, 'stroke-width': 1.2 }));
                drawMeasure(measure, x, measureW);
                x += measureW;
            });
            staff.appendChild(svgEl('line', { x1: x, y1: T_TOP, x2: x, y2: B_BOTTOM, stroke: INK, 'stroke-width': 2 }));
        }

        function drawMeasure(measure, mx, mw) {
            const evs = measure.events;
            const stepX = mw / evs.length;
            const xs = evs.map((_, i) => mx + stepX * (i + 0.5));
            // positions dessinées, pour beams/liaisons : {side: {evIdx: {stemX, tipY, headYs, xs}}}
            const drawn = { t: [], b: [] };

            evs.forEach((ev, ei) => {
                ['t', 'b'].forEach(side => {
                    const notes = ev[side];
                    if (!notes.length) { drawn[side][ei] = null; return; }
                    const x = xs[ei];
                    const info = drawSideEvent(notes, x, side, ev, ei);
                    drawn[side][ei] = info;
                    if (ev[side === 't' ? 'at' : 'ab']) drawArpeggio(x - 11, info.minY - 4, info.maxY + 4);
                });
            });

            // barres de croches (beams)
            ['t', 'b'].forEach(side => {
                const gk = side === 't' ? 'gt' : 'gb';
                const groups = {};
                evs.forEach((ev, ei) => {
                    if (ev[gk] >= 0 && drawn[side][ei]) (groups[ev[gk]] = groups[ev[gk]] || []).push(ei);
                });
                for (const gid in groups) {
                    const members = groups[gid];
                    if (members.length < 2) { drawFlagsFallback(side, members, drawn, evs); continue; }
                    // direction commune : majorité des hampes
                    const ups = members.filter(ei => drawn[side][ei].up).length;
                    const up = ups >= members.length / 2;
                    // niveau de barre : extrême des bouts potentiels
                    let beamY = up ? Infinity : -Infinity;
                    members.forEach(ei => {
                        const d = drawn[side][ei];
                        const tip = up ? d.minY - 24 : d.maxY + 24;
                        beamY = up ? Math.min(beamY, tip) : Math.max(beamY, tip);
                    });
                    // redessiner les hampes jusqu'à la barre
                    members.forEach(ei => {
                        const d = drawn[side][ei];
                        const sx = up ? d.x + 6.8 : d.x - 6.8;
                        const from = up ? d.maxY : d.minY;
                        staff.appendChild(svgEl('line', { x1: sx, y1: from, x2: sx, y2: beamY, stroke: INK, 'stroke-width': 1.4 }));
                        d.stemX = sx;
                    });
                    const x1 = drawn[side][members[0]].stemX, x2 = drawn[side][members[members.length - 1]].stemX;
                    const count = measure.beamCounts[gid] || 1;
                    for (let bl = 0; bl < count; bl++) {
                        const off = (up ? 1 : -1) * bl * 5;
                        staff.appendChild(svgEl('line', { x1: x1, y1: beamY + off, x2: x2, y2: beamY + off, stroke: INK, 'stroke-width': 3.2 }));
                    }
                }
            });

            // hampes + crochets isolés (événements hors groupe)
            evs.forEach((ev, ei) => {
                ['t', 'b'].forEach(side => {
                    const d = drawn[side][ei];
                    if (!d || d.stemX !== undefined) return;
                    if (d.allWhole) return; // rondes : pas de hampe
                    const up = d.up;
                    const sx = up ? d.x + 6.8 : d.x - 6.8;
                    const y1 = up ? d.maxY : d.minY;
                    const y2 = up ? d.minY - 24 : d.maxY + 24;
                    staff.appendChild(svgEl('line', { x1: sx, y1: y1, x2: sx, y2: y2, stroke: INK, 'stroke-width': 1.4 }));
                    const nf = ev[side === 't' ? 'ft' : 'fb'];
                    for (let f = 0; f < nf; f++) {
                        const fy = y2 + (up ? f * 6 : -f * 6);
                        const dir = up ? 1 : -1;
                        staff.appendChild(svgEl('path', {
                            d: `M ${sx} ${fy} q 7 ${3 * dir} 5 ${13 * dir}`,
                            stroke: INK, 'stroke-width': 1.6, fill: 'none'
                        }));
                    }
                });
            });

            // liaisons
            measure.curves.forEach(([k0, k1, side, pitchTok, up]) => {
                const target = parseTok(pitchTok);
                const d0 = drawn[side][k0];
                if (!d0) return;
                const y0 = yForSide(target, side);
                const x0 = xs[k0] + 8;
                let x1;
                if (k1 >= 0 && drawn[side][k1]) x1 = xs[k1] - 8;
                else x1 = Math.min(xs[k0] + stepX * 1.2, mx + mw - 4);
                if (x1 - x0 < 10) x1 = x0 + 10;
                const depth = Math.min(9, Math.max(4, (x1 - x0) * 0.28));
                const bend = up ? -depth : depth;
                const yEdge = y0 + (up ? -6 : 6);
                staff.appendChild(svgEl('path', {
                    d: `M ${x0} ${yEdge} Q ${(x0 + x1) / 2} ${yEdge + bend} ${x1} ${yEdge}`,
                    stroke: INK, 'stroke-width': 1.5, fill: 'none'
                }));
            });
        }

        function drawFlagsFallback(side, members, drawn, evs) {
            // groupe d'1 seul membre : traité comme hampe isolée (rien à faire ici)
        }

        function drawSideEvent(notes, x, side, ev, ei) {
            const top = side === 't' ? T_TOP : B_TOP;
            const bottom = side === 't' ? T_BOTTOM : B_BOTTOM;
            let minY = Infinity, maxY = -Infinity;
            let sumDiat = 0;
            const allWhole = notes.every(n => n.head === 'w');

            notes.forEach(n => {
                const y = yForSide(n, side);
                minY = Math.min(minY, y); maxY = Math.max(maxY, y);
                sumDiat += n.diatonic;
                // lignes supplémentaires
                if (y < top) for (let ly = top - LINE_GAP; ly >= y - 1; ly -= LINE_GAP)
                    staff.appendChild(svgEl('line', { x1: x - 12, y1: ly, x2: x + 12, y2: ly, stroke: INK, 'stroke-width': 1.2 }));
                if (y > bottom) for (let ly = bottom + LINE_GAP; ly <= y + 1; ly += LINE_GAP)
                    staff.appendChild(svgEl('line', { x1: x - 12, y1: ly, x2: x + 12, y2: ly, stroke: INK, 'stroke-width': 1.2 }));
                // tête
                if (n.head === 'q') {
                    staff.appendChild(svgEl('ellipse', { cx: x, cy: y, rx: 7.2, ry: 5.6, fill: INK, transform: `rotate(-18 ${x} ${y})` }));
                } else if (n.head === 'h') {
                    staff.appendChild(svgEl('ellipse', { cx: x, cy: y, rx: 7.2, ry: 5.4, fill: 'none', stroke: INK, 'stroke-width': 1.9, transform: `rotate(-18 ${x} ${y})` }));
                } else {
                    staff.appendChild(svgEl('ellipse', { cx: x, cy: y, rx: 8.6, ry: 5.6, fill: 'none', stroke: INK, 'stroke-width': 2.2 }));
                }
                // altération
                const sym = accSymbol(n.acc);
                if (sym) {
                    const sh = svgEl('text', { x: x - 21, y: y + 6, 'font-size': 18, fill: INK });
                    sh.textContent = sym; staff.appendChild(sh);
                }
                // point : dans l'espace (si la note est sur une ligne, décaler vers le haut)
                if (n.dot) {
                    const ref = side === 't' ? T_REF : B_REF;
                    const onLine = ((n.diatonic - ref) % 2 + 2) % 2 === 0;
                    staff.appendChild(svgEl('circle', { cx: x + 12, cy: y - (onLine ? 3.5 : 0), r: 1.9, fill: INK }));
                }
            });
            const mid = side === 't' ? 33 : 21; // B4 / D3
            const up = (sumDiat / notes.length) < mid;
            return { x, minY, maxY, up, allWhole };
        }

        function drawArpeggio(x, y0, y1) {
            let d = `M ${x} ${y0}`;
            for (let y = y0; y < y1; y += 6) d += ` q 3 3 0 6`;
            staff.appendChild(svgEl('path', { d, stroke: INK, 'stroke-width': 1.5, fill: 'none' }));
        }

        // ---------- Son ----------
        let audioCtx = null;
        function ensureAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }
        function playNote(midi, when) {
            ensureAudio();
            const freq = 440 * Math.pow(2, (midi - 69) / 12);
            const now = audioCtx.currentTime + (when || 0);
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.0001, now);
            gain.gain.exponentialRampToValueAtTime(0.22, now + 0.008);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 1.1);
            gain.connect(audioCtx.destination);
            [[freq, 'triangle', 1], [freq * 2, 'sine', 0.35]].forEach(([f, type, mul]) => {
                const osc = audioCtx.createOscillator();
                osc.type = type; osc.frequency.value = f;
                const g = audioCtx.createGain(); g.gain.value = mul;
                osc.connect(g).connect(gain);
                osc.start(now); osc.stop(now + 1.2);
            });
        }
        function playExcerpt() {
            let t = 0;
            excerpt.forEach(measure => measure.events.forEach(ev => {
                allNotes(ev).forEach(n => playNote(n.midi, t));
                t += 0.45;
            }));
        }

        // ---------- Génération d'extrait ----------
        function flattenEvents() {
            const evs = [];
            excerpt.forEach(measure => measure.events.forEach(ev => evs.push(allNotes(ev).map(n => n.midi))));
            return evs;
        }
        let flatEvents = [];

        function newExcerpt() {
            const start = 1 + rand(TOTAL_MEASURES - excerptLen + 1);
            excerpt = PIECE.slice(start - 1, start - 1 + excerptLen);
            flatEvents = flattenEvents();
            step = 0; clicked.clear(); locked = false;
            drawStaff();
            clearKeyStates();
            revealDisplay();
            scheduleHide();
            updateConfidence();
            playExcerpt();
        }

        function updateConfidence() {
            const el = document.getElementById('confidence');
            el.className = 'confidence solid';
            el.textContent = '✓ Mesures ' + excerpt[0].index + '–' + excerpt[excerpt.length - 1].index + ' : transcription fidèle';
        }

        // ---------- Affichage / cachette ----------
        function revealDisplay() {
            document.getElementById('hiddenCard').classList.add('is-hidden');
            document.getElementById('staffWrap').classList.remove('is-hidden');
        }
        function scheduleHide() {
            if (hideTimer) clearTimeout(hideTimer);
            if (!hideMs) return;
            hideTimer = setTimeout(() => {
                document.getElementById('staffWrap').classList.add('is-hidden');
                document.getElementById('hiddenCard').classList.remove('is-hidden');
            }, hideMs);
        }

        // ---------- Interaction ----------
        function onKeyPress(midi) {
            if (!keyEls[midi]) return;
            playNote(midi, 0);
            if (locked) return;
            const el = keyEls[midi];
            el.classList.add('active');
            setTimeout(() => el.classList.remove('active'), 100);

            const target = flatEvents[step];
            if (target.includes(midi)) {
                if (clicked.has(midi)) return;
                clicked.add(midi);
                el.classList.add('correct');
                if (clicked.size === target.length) {
                    step++;
                    clicked.clear();
                    if (step >= flatEvents.length) {
                        locked = true;
                        if (hideTimer) clearTimeout(hideTimer);
                        score++; streak++; updateScore();
                        setTimeout(newExcerpt, 700);
                    } else {
                        setTimeout(clearKeyStates, 150);
                    }
                }
            } else {
                locked = true;
                if (hideTimer) clearTimeout(hideTimer);
                el.classList.add('wrong');
                mistakes++; streak = 0; updateScore();
                revealDisplay();
                target.forEach(m => keyEls[m] && keyEls[m].classList.add('correct'));
                setTimeout(newExcerpt, 1100);
            }
        }
        function clearKeyStates() {
            for (const m in keyEls) keyEls[m].classList.remove('correct', 'wrong', 'active');
        }
        function updateScore() {
            document.getElementById('score').textContent = score;
            document.getElementById('streak').textContent = streak;
            document.getElementById('mistakes').textContent = mistakes;
            saveState();
        }

        // ---------- Contrôles ----------
        document.getElementById('newExcerpt').addEventListener('click', () => { if (!locked) newExcerpt(); });
        document.getElementById('replay').addEventListener('click', playExcerpt);
        document.getElementById('showKeyNames').addEventListener('change', () => { refreshKeyNames(); saveState(); });

        function wireSegment(id, fn) {
            document.querySelectorAll('#' + id + ' button').forEach(b => {
                b.addEventListener('click', () => {
                    document.querySelectorAll('#' + id + ' button').forEach(x => x.classList.remove('active'));
                    b.classList.add('active');
                    fn(b);
                    saveState();
                });
            });
        }
        wireSegment('lenMode', b => { excerptLen = +b.dataset.len; if (!locked) newExcerpt(); });
        wireSegment('hideMode', b => { hideMs = +b.dataset.ms; revealDisplay(); scheduleHide(); });
        wireSegment('pieceMode', b => { selectPiece(b.dataset.piece); newExcerpt(); });

        window.addEventListener('resize', fitKeyboard);

        // ---------- MIDI ----------
        const midiStatusEl = document.getElementById('midiStatus');
        function setMidiStatus(cls, text) { midiStatusEl.className = 'midi-status ' + cls; midiStatusEl.textContent = text; }
        function onMIDIMessage(e) {
            const [status, note, velocity] = e.data;
            if ((status & 0xf0) === 0x90 && velocity > 0) onKeyPress(note);
        }
        function refreshMidiInputs(access) {
            const inputs = [...access.inputs.values()];
            inputs.forEach(input => { input.onmidimessage = onMIDIMessage; });
            setMidiStatus(inputs.length ? 'on' : '', inputs.length ? '🎹 MIDI connecté : ' + inputs.map(i => i.name || 'appareil').join(', ') : '🎛️ MIDI : aucun clavier détecté');
        }
        function initMIDI() {
            if (!navigator.requestMIDIAccess) { setMidiStatus('', '🎛️ MIDI non supporté par ce navigateur'); return; }
            navigator.requestMIDIAccess().then(access => {
                refreshMidiInputs(access);
                access.onstatechange = () => refreshMidiInputs(access);
            }).catch(() => setMidiStatus('', '🎛️ MIDI : accès refusé'));
        }
        initMIDI();

        // ---------- Persistance ----------
        function activateSeg(id, attr, value) {
            document.querySelectorAll('#' + id + ' button').forEach(b => b.classList.toggle('active', b.dataset[attr] === String(value)));
        }
        function saveState() {
            try {
                localStorage.setItem('extraitTrainer', JSON.stringify({
                    piece: currentPieceKey, excerptLen, hideMs,
                    showKeyNames: document.getElementById('showKeyNames').checked,
                    score, streak, mistakes
                }));
            } catch (e) { /* indisponible */ }
        }
        function loadState() {
            let s;
            try { s = JSON.parse(localStorage.getItem('extraitTrainer')); } catch (e) { return; }
            if (!s) return;
            if (s.piece && PIECES[s.piece]) { activateSeg('pieceMode', 'piece', s.piece); }
            if (s.excerptLen) { excerptLen = s.excerptLen; activateSeg('lenMode', 'len', excerptLen); }
            if (typeof s.hideMs === 'number') { hideMs = s.hideMs; activateSeg('hideMode', 'ms', hideMs); }
            if (typeof s.showKeyNames === 'boolean') document.getElementById('showKeyNames').checked = s.showKeyNames;
            score = s.score || 0; streak = s.streak || 0; mistakes = s.mistakes || 0;
            return s.piece && PIECES[s.piece] ? s.piece : 'krumkake';
        }

        // ---------- Démarrage ----------
        const startPiece = loadState() || 'krumkake';
        updateScore();
        selectPiece(startPiece);
        newExcerpt();
    </script>
</body>

</html>
